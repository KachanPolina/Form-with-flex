<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="./Assets/CSS/style.css">
</head>
<body>
    <div class="form-container">
        <div class="title">
            <h2>CREATE AN ACCOUNT</h2>
            <p>We always keep your name and email adress private</p>
        </div>
        <form>
            <div class="input-comtainer">
                <input type="text" name="first-name" id="first-name" placeholder="First name">
                <input type="text" name="last-name" id="last-name" placeholder="Last name">
                <input type="text" name="display-name" id="display-name" placeholder="Disaply name">
                <input type="email" name="email" id="email" placeholder="Email Address">
                <input type="password" name="password" id="password" placeholder="Password">
                <input type="password" name="password-confirm" id="password-confirm" placeholder="Password confirmation">
            </div>
            <div class="radio-container">
                <div class="radiobutton">
                    <div class="rb-name">
                        <input type="radio" name="join-as" id="join-as-buyer">
                        <label for="join-as-buyer">Join as a buyer</label>
                    </div>
                   <div class="rb-text">
                        <p>I am looking for a Name, Logo or Tagline for my business, brand or product</p>
                   </div>
                </div>
                <div class="radiobutton">
                    <div class="rb-name">
                        <input type="radio" name="join-as" id="join-as-creative">
                        <label for="join-as-creative">Join as a creative or marketplace seller</label>
                    </div>
                    <div class="rb-text">
                        <p>I plan to submit name ideas, Logo designs or sell names in Domain Marketplace</p>
                    </div>
                </div>
            </div>
            <div class="checkbox-continer">
                <input type="checkbox" name="offers" id="offers">
                <label for="offers">Allow Squadhelp to send marketing/promotional offers from time to time</label>
            </div>
            <div class="button-container">
                <button type="submit">Create account</button>
            </div>
        </form>
    </div>
</body>
</html>
